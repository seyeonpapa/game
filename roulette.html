<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="구름냥">
  <meta name="theme-color" content="#FFE4F1">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/svg+xml" href="/icon.svg">
  <link rel="apple-touch-icon" href="/icon.svg">
  <title>룰렛 - 구름냥의 게임세상</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Jua&family=Gaegu:wght@400;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="roulette.css">
</head>
<body>

  <!-- 메인으로 버튼 -->
  <a href="/" class="btn-home" title="메인으로">
    <span class="home-icon">🏠</span>
    <span class="home-text">메인으로</span>
  </a>

  <!-- ============ 시작 화면 (항목 입력) ============ -->
  <div id="screen-start" class="screen active">
    <div class="start-container">
      <div class="logo-area">
        <div class="logo-emoji">🎡</div>
        <h1 class="logo-title">룰렛 게임</h1>
        <p class="logo-sub">~ 무엇이 나올까냥? ~</p>
      </div>

      <div class="input-section">
        <div class="input-header">
          <span class="input-title">항목을 적어볼까요?</span>
          <span class="input-counter"><span id="item-count">0</span> / 8</span>
        </div>

        <div class="input-row">
          <input type="text" id="item-input" class="item-input"
            placeholder="예: 떡볶이, 치킨, 짜장면..."
            autocomplete="off" maxlength="20">
          <button class="btn-add" onclick="addItem()" id="btn-add">+</button>
        </div>

        <div class="items-list" id="items-list">
          <p class="empty-msg">최소 2개, 최대 8개까지 넣을 수 있어요!</p>
        </div>

        <div class="quick-presets">
          <span class="presets-label">빠른 예시:</span>
          <button class="preset-chip" onclick="loadPreset('food')">🍕 음식</button>
          <button class="preset-chip" onclick="loadPreset('drink')">🥤 음료</button>
          <button class="preset-chip" onclick="loadPreset('activity')">🎮 뭐할까</button>
        </div>

        <button class="btn-start-game" id="btn-start" onclick="startRoulette()" disabled>
          룰렛 돌리러 가기!
        </button>
      </div>
    </div>
  </div>

  <!-- ============ 룰렛 화면 ============ -->
  <div id="screen-game" class="screen">
    <div class="game-container">
      <div class="game-header">
        <button class="btn-back-game" onclick="goBackToInput()">&larr; 항목 수정</button>
      </div>

      <div class="wheel-area">
        <div class="pointer">
          <div class="pointer-inner"></div>
        </div>
        <div class="wheel-wrapper">
          <svg id="wheel" class="wheel" viewBox="0 0 400 400"></svg>
          <div class="wheel-center">
            <span class="wheel-center-emoji">🎯</span>
          </div>
        </div>
      </div>

      <button class="btn-spin" id="btn-spin" onclick="spinWheel()">
        <span class="spin-text">돌리기!</span>
      </button>

      <div id="result-display" class="result-display"></div>
    </div>
  </div>

  <script src="roulette.js"></script>
</body>
</html>
